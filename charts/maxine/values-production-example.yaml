replicaCount: 3

image:
  repository: ghcr.io/vrushankpatel/maxine
  tag: "1.0.0"

maxine:
  registryStateMode: redis
  redis:
    keyPrefix: maxine:prod

auth:
  existingSecret: maxine-auth

persistence:
  enabled: false

logs:
  persistence:
    enabled: true
    size: 5Gi
    storageClassName: standard

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: maxine.example.com
      paths:
        - path: /
          pathType: Prefix

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

embeddedRedis:
  enabled: true
  auth:
    enabled: true
    existingSecret: maxine-redis-auth
  persistence:
    enabled: true
    size: 5Gi
    storageClassName: standard
