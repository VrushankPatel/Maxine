apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "maxine.fullname" . }}
  labels:
    {{- include "maxine.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: {{ ternary "RollingUpdate" "Recreate" (and (eq .Values.maxine.registryStateMode "redis") (gt (int .Values.replicaCount) 1)) }}
  selector:
    matchLabels:
      {{- include "maxine.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "maxine.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- if and .Values.embeddedRedis.enabled .Values.embeddedRedis.auth.enabled }}
        checksum/embedded-redis-secret: {{ include (print $.Template.BasePath "/embedded-redis-secret.yaml") . | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "maxine.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: maxine
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "maxine.configMapName" . }}
            - secretRef:
                name: {{ include "maxine.secretName" . }}
          {{- if and .Values.embeddedRedis.enabled .Values.embeddedRedis.auth.enabled }}
          env:
            - name: MAXINE_REGISTRY_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "maxine.embeddedRedisSecretName" . }}
                  key: MAXINE_REGISTRY_REDIS_URL
          {{- end }}
          {{- with .Values.extraEnv }}
          {{- if not (and $.Values.embeddedRedis.enabled $.Values.embeddedRedis.auth.enabled) }}
          env:
          {{- end }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: logs
              mountPath: /app/logs
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          startupProbe:
            {{- toYaml .Values.startupProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "maxine.dataClaimName" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: logs
          {{- if .Values.logs.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "maxine.logsClaimName" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
