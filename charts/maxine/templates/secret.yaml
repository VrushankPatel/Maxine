{{- if not .Values.auth.existingSecret }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace (printf "%s-auth" (include "maxine.fullname" .)) -}}
{{- $jwtSecret := "" -}}
{{- if .Values.auth.jwtSecret -}}
{{- $jwtSecret = .Values.auth.jwtSecret -}}
{{- else if $existing -}}
{{- $jwtSecret = (index $existing.data "MAXINE_JWT_SECRET" | b64dec) -}}
{{- else -}}
{{- $jwtSecret = randAlphaNum 64 -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-auth" (include "maxine.fullname" .) }}
  labels:
    {{- include "maxine.labels" . | nindent 4 }}
type: Opaque
stringData:
  MAXINE_ADMIN_USERNAME: {{ .Values.auth.adminUsername | quote }}
  MAXINE_ADMIN_PASSWORD: {{ .Values.auth.adminPassword | quote }}
  MAXINE_JWT_SECRET: {{ $jwtSecret | quote }}
{{- end }}
