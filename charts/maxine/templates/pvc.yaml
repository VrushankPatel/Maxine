{{- if and .Values.persistence.enabled (not .Values.persistence.existingClaim) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "maxine.dataClaimName" . }}
  labels:
    {{- include "maxine.labels" . | nindent 4 }}
  {{- with .Values.persistence.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  accessModes:
    {{- toYaml .Values.persistence.accessModes | nindent 4 }}
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
  {{- with .Values.persistence.storageClassName }}
  storageClassName: {{ . }}
  {{- end }}
{{- end }}
---
{{- if and .Values.logs.persistence.enabled (not .Values.logs.persistence.existingClaim) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "maxine.logsClaimName" . }}
  labels:
    {{- include "maxine.labels" . | nindent 4 }}
  {{- with .Values.logs.persistence.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  accessModes:
    {{- toYaml .Values.logs.persistence.accessModes | nindent 4 }}
  resources:
    requests:
      storage: {{ .Values.logs.persistence.size }}
  {{- with .Values.logs.persistence.storageClassName }}
  storageClassName: {{ . }}
  {{- end }}
{{- end }}
