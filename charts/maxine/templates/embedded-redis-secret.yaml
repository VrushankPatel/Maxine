{{- if and .Values.embeddedRedis.enabled .Values.embeddedRedis.auth.enabled (not .Values.embeddedRedis.auth.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "maxine.embeddedRedisSecretName" . }}
  labels:
    {{- include "maxine.labels" . | nindent 4 }}
type: Opaque
stringData:
  REDIS_PASSWORD: {{ required "embeddedRedis.auth.password is required when embeddedRedis.auth.enabled=true and no existing secret is provided." .Values.embeddedRedis.auth.password | quote }}
  MAXINE_REGISTRY_REDIS_URL: {{ include "maxine.embeddedRedisUrlWithAuth" . | quote }}
{{- end }}
