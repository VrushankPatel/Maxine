replicaCount: 1

image:
  repository: ghcr.io/vrushankpatel/maxine
  pullPolicy: IfNotPresent
  tag: latest

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: false
  automount: false
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  fsGroup: 10001

securityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 8080
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: maxine.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

maxine:
  registryStateMode: local
  registryStateLockTimeoutMs: 5000
  registryStateLockRetryMs: 100
  cluster:
    leaderElectionEnabled: true
    leaseMs: 15000
    renewMs: 5000
  activeHealthChecks:
    enabled: false
    intervalMs: 15000
    timeoutMs: 3000
    failureThreshold: 3
    path: ""
  alerts:
    webhookUrl: ""
    webhookTimeoutMs: 5000
  tracing:
    headerName: x-trace-id
  redis:
    url: ""
    keyPrefix: maxine:registry
    connectTimeoutMs: 5000
  performanceReportUrl: ""

auth:
  existingSecret: ""
  adminUsername: admin
  adminPassword: admin
  operatorUsername: ""
  operatorPassword: ""
  viewerUsername: ""
  viewerPassword: ""
  jwtSecret: ""

persistence:
  enabled: true
  existingClaim: ""
  accessModes:
    - ReadWriteOnce
  size: 1Gi
  storageClassName: ""
  annotations: {}

logs:
  persistence:
    enabled: false
    existingClaim: ""
    accessModes:
      - ReadWriteOnce
    size: 1Gi
    storageClassName: ""
    annotations: {}

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

livenessProbe:
  httpGet:
    path: /api/actuator/health
    port: http
  initialDelaySeconds: 20
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 5

readinessProbe:
  httpGet:
    path: /api/actuator/health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 5

startupProbe:
  httpGet:
    path: /api/actuator/health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 18

nodeSelector: {}
tolerations: []
affinity: {}

extraEnv: []
extraVolumes: []
extraVolumeMounts: []

embeddedRedis:
  enabled: false
  image:
    repository: redis
    tag: 7.2-alpine
    pullPolicy: IfNotPresent
  auth:
    enabled: false
    existingSecret: ""
    password: ""
  service:
    port: 6379
  persistence:
    enabled: true
    accessModes:
      - ReadWriteOnce
    size: 1Gi
    storageClassName: ""
    annotations: {}
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi
