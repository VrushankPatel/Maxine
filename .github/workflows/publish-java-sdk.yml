name: Publish Java SDK

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
      MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
      MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
      MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate publishing configuration
        run: |
          test -n "$MAVEN_CENTRAL_USERNAME" || (echo "Missing secret MAVEN_CENTRAL_USERNAME" && exit 1)
          test -n "$MAVEN_CENTRAL_PASSWORD" || (echo "Missing secret MAVEN_CENTRAL_PASSWORD" && exit 1)
          test -n "$MAVEN_GPG_PRIVATE_KEY" || (echo "Missing secret MAVEN_GPG_PRIVATE_KEY" && exit 1)
          test -n "$MAVEN_GPG_PASSPHRASE" || (echo "Missing secret MAVEN_GPG_PASSPHRASE" && exit 1)

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_PASSWORD
          gpg-private-key: ${{ env.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Build Java SDK modules
        run: mvn -B -f client-sdk/java/pom.xml -DskipTests package

      - name: Publish Java SDK modules to Maven Central
        run: mvn -B -f client-sdk/java/pom.xml -Prelease -DskipTests deploy
